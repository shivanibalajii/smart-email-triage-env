name: smart-email-triage-env
version: "1.0.0"
description: >
  An RL environment where an agent triages emails and resolves meeting conflicts
  by classifying them as escalate, reply, archive, or flag.
  Simulates real-world email management and scheduling under pressure.
author: shivanibalajii
space_url: https://huggingface.co/spaces/shivanibalajii/smart-email-triage-env-final

tasks:
  - id: easy
    description: Classify obviously spam or urgent emails
    difficulty: easy
    min_score: 0.01
    max_score: 0.99
  - id: medium
    description: Classify emails requiring context awareness
    difficulty: medium
    min_score: 0.01
    max_score: 0.99
  - id: hard
    description: Ambiguous emails requiring expert judgment
    difficulty: hard
    min_score: 0.01
    max_score: 0.99
  - id: meeting
    description: Resolve meeting conflicts and scheduling issues under pressure
    difficulty: expert
    min_score: 0.01
    max_score: 0.99

observation_space:
  email_id: integer
  subject: string
  sender: string
  body: string
  task: string
  difficulty: string

action_space:
  action:
    type: string
    values: [escalate, reply, archive, flag]

reward:
  min: 0.01
  max: 0.99
  description: >
    0.95 for correct classification, partial credit for related actions,
    0.05 for dangerous misclassifications like ignoring urgent emails.

endpoints:
  reset: POST /reset?task={easy|medium|hard|meeting}
  step: POST /step
  state: GET /state
  grade: GET /grade
  grade_llm: GET /grade_llm
  history: GET /history

baseline_scores:
  easy: 0.85
  medium: 0.75
  hard: 0.65
  meeting: 0.66